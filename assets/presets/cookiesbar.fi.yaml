# Small GDPR v2 — oletusasetukset (suomi)
# Tuonti: Asetukset → Small GDPR → Tuonti → "Tuo oletusasetukset".

tag_type: "none"
tag_id: ""
production_only: 1
consent_event_name: "cookie_consent_update"

cookies_bar_title: "Sivusto käyttää evästeitä"
cookies_bar_content: "<p>Osa on välttämättömiä, muut ovat valinnaisia. Sinä päätät.</p>"
cookies_bar_disable_page_reload: 1

btn_accept_label: "Hyväksy"
btn_reject_label: "Hylkää"
btn_reject_show: 1
btn_settings_label: "Asetukset"
btn_settings_show: 1
btn_save_label: "Tallenna valinta"

cookies_manage_title: "Evästeasetukset"
cookies_manage_content: "<p>Osa evästeistä on välttämättömiä sivuston toiminnan kannalta, muista voit päättää itse.</p>"
cookies_manage_disable_page_reload: 1

cookies:
-   title: "Pakolliset evästeet"
    description: "<p>Sivuston toiminnan kannalta pakolliset evästeet.</p>"
    slug: "pakollinen"
    required: 1
    consent_types:
    -   "functionality_storage"
    -   "security_storage"
    scripts: []
-   title: "Tilastotiedon evästeet"
    description: "<p>Anonyymitilastointi auttaa meitä analysoimaan, miten käyttäjät käyttävät sivustoa.</p>"
    slug: "tilastollinen"
    required: 0
    consent_types:
    -   "analytics_storage"
    scripts: []
-   title: "Markkinointievästeet"
    description: "<p>Markkinointievästeitä käytetään mainonnan kohdentamisessa käyttäjän kiinnostuksen mukaan.</p>"
    slug: "markkinointi"
    required: 0
    consent_types:
    -   "ad_storage"
    -   "ad_user_data"
    -   "ad_personalization"
    scripts: []

set_cookies_lifetime_days: 365
set_cookies_with_locale: 0

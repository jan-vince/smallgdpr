fields: { }
tabs:
    stretch: true
    fields:

        ## ============================ Cookies ============================

        section_integration:
            label: 'janvince.smallgdpr::lang.settings.tabs.integration'
            type: section
            span: full
            tab: 'janvince.smallgdpr::lang.settings.tabs.cookies'
        tag_type:
            label: 'janvince.smallgdpr::lang.settings.form_fields.tag_type'
            comment: 'janvince.smallgdpr::lang.settings.form_fields.tag_type_description'
            type: dropdown
            span: left
            default: none
            tab: 'janvince.smallgdpr::lang.settings.tabs.cookies'
            options:
                none: 'janvince.smallgdpr::lang.settings.form_fields.tag_type_option_none'
                ga4: 'janvince.smallgdpr::lang.settings.form_fields.tag_type_option_ga4'
                gtm: 'janvince.smallgdpr::lang.settings.form_fields.tag_type_option_gtm'
        tag_id:
            label: 'janvince.smallgdpr::lang.settings.form_fields.tag_id'
            comment: 'janvince.smallgdpr::lang.settings.form_fields.tag_id_description'
            type: text
            span: right
            tab: 'janvince.smallgdpr::lang.settings.tabs.cookies'
            trigger:
                action: show
                field: tag_type
                condition: 'value[ga4][gtm]'
        consent_event_name:
            label: 'janvince.smallgdpr::lang.settings.form_fields.consent_event_name'
            comment: 'janvince.smallgdpr::lang.settings.form_fields.consent_event_name_description'
            type: text
            default: cookie_consent_update
            span: full
            tab: 'janvince.smallgdpr::lang.settings.tabs.cookies'
        production_only:
            label: 'janvince.smallgdpr::lang.settings.form_fields.production_only'
            comment: 'janvince.smallgdpr::lang.settings.form_fields.production_only_description'
            type: checkbox
            default: 1
            span: full
            tab: 'janvince.smallgdpr::lang.settings.tabs.cookies'

        section_cookies_groups:
            label: 'janvince.smallgdpr::lang.settings.tabs.cookies_list'
            type: section
            span: full
            cssClass: mt-4
            tab: 'janvince.smallgdpr::lang.settings.tabs.cookies'
        cookies:
            prompt: 'janvince.smallgdpr::lang.settings.form_fields.cookies_list_prompt'
            span: full
            type: repeater
            style: collapsed
            tab: 'janvince.smallgdpr::lang.settings.tabs.cookies'
            form:
                fields:
                    title:
                        label: 'janvince.smallgdpr::lang.settings.form_fields.title'
                        type: text
                        span: left
                        required: true
                    description:
                        label: 'janvince.smallgdpr::lang.settings.form_fields.description'
                        type: richeditor
                        span: right
                        size: large
                    slug:
                        label: 'janvince.smallgdpr::lang.settings.form_fields.slug'
                        type: text
                        span: left
                        preset:
                            field: title
                            type: slug
                        required: true
                    required:
                        label: 'janvince.smallgdpr::lang.settings.form_fields.cookie_required'
                        comment: 'janvince.smallgdpr::lang.settings.form_fields.cookie_required_description'
                        type: checkbox
                        span: left
                        default: false
                    default_enabled:
                        label: 'janvince.smallgdpr::lang.settings.form_fields.cookie_default_enabled'
                        comment: 'janvince.smallgdpr::lang.settings.form_fields.cookie_default_enabled_description'
                        type: checkbox
                        span: left
                        default: false
                    default_modal_checked:
                        label: 'janvince.smallgdpr::lang.settings.form_fields.cookie_default_modal_checked'
                        comment: 'janvince.smallgdpr::lang.settings.form_fields.cookie_default_modal_checked_description'
                        type: checkbox
                        span: left
                        default: false
                        trigger:
                            action: hide
                            field: required
                            condition: checked
                    consent_types_section:
                        comment: 'janvince.smallgdpr::lang.settings.form_fields.consent_types'
                        type: section
                    consent_types:
                        label: 'janvince.smallgdpr::lang.settings.form_fields.consent_types'
                        commentAbove: 'janvince.smallgdpr::lang.settings.form_fields.consent_types_description'
                        type: checkboxlist
                        span: full
                        options:
                            analytics_storage: 'analytics_storage'
                            ad_storage: 'ad_storage'
                            ad_user_data: 'ad_user_data'
                            ad_personalization: 'ad_personalization'
                            functionality_storage: 'functionality_storage'
                            personalization_storage: 'personalization_storage'
                            security_storage: 'security_storage'
                    scripts_code_section:
                        comment: 'janvince.smallgdpr::lang.settings.form_fields.scripts'
                        type: section
                    scripts:
                        prompt: 'janvince.smallgdpr::lang.settings.form_fields.scripts_prompt'
                        span: full
                        type: repeater
                        style: collapsed
                        titleFrom: scripts_title
                        tab: 'janvince.smallgdpr::lang.settings.tabs.cookies'
                        form:
                            fields:
                                scripts_title:
                                    label: 'janvince.smallgdpr::lang.settings.form_fields.scripts_title'
                                    comment: 'janvince.smallgdpr::lang.settings.form_fields.scripts_title_description'
                                    type: text
                                    span: left
                                scripts_position:
                                    label: 'janvince.smallgdpr::lang.settings.form_fields.scripts_position'
                                    comment: 'janvince.smallgdpr::lang.settings.form_fields.scripts_position_description'
                                    type: dropdown
                                    span: right
                                    default: body
                                    options:
                                        body: 'janvince.smallgdpr::lang.settings.form_fields.scripts_position_body'
                                        head: 'janvince.smallgdpr::lang.settings.form_fields.scripts_position_head'
                                scripts_file:
                                    label: 'janvince.smallgdpr::lang.settings.form_fields.scripts_file'
                                    comment: 'janvince.smallgdpr::lang.settings.form_fields.scripts_file_description'
                                    type: mediafinder
                                    mode: file
                                    span: left
                                scripts_run_production:
                                    label: 'janvince.smallgdpr::lang.settings.form_fields.scripts_run_production'
                                    comment: 'janvince.smallgdpr::lang.settings.form_fields.scripts_run_production_description'
                                    type: checkbox
                                    span: right
                                scripts_code:
                                    label: 'janvince.smallgdpr::lang.settings.form_fields.scripts_code'
                                    comment: 'janvince.smallgdpr::lang.settings.form_fields.scripts_code_description'
                                    type: codeeditor
                                    size: huge
                                    span: full
                                    language: html
                                    fontSize: 12px
                                scripts_disable:
                                    label: 'janvince.smallgdpr::lang.settings.form_fields.scripts_disable'
                                    comment: 'janvince.smallgdpr::lang.settings.form_fields.scripts_disable_description'
                                    type: checkbox
                                    default: false
                                    span: left
                                scripts_run_pages:
                                    label: 'janvince.smallgdpr::lang.settings.form_fields.scripts_run_pages'
                                    comment: 'janvince.smallgdpr::lang.settings.form_fields.scripts_run_pages_description'
                                    type: checkbox
                                    default: false
                                    span: right
                                scripts_run_pages_list:
                                    label: 'janvince.smallgdpr::lang.settings.form_fields.scripts_run_pages_list'
                                    prompt: 'janvince.smallgdpr::lang.settings.form_fields.scripts_run_pages_list_prompt'
                                    span: full
                                    type: repeater
                                    style: collapsed
                                    titleFrom: page_url
                                    cssClass: field-indent
                                    tab: 'janvince.smallgdpr::lang.settings.tabs.cookies'
                                    trigger:
                                        action: show
                                        field: scripts_run_pages
                                        condition: checked
                                    form:
                                        fields:
                                            page_url:
                                                label: 'janvince.smallgdpr::lang.settings.form_fields.page_url'
                                                comment: 'janvince.smallgdpr::lang.settings.form_fields.page_url_description'
                                                type: text
                                                span: full

        integration_custom_section:
            label: 'janvince.smallgdpr::lang.settings.form_fields.integration_custom_section'
            comment: 'janvince.smallgdpr::lang.settings.form_fields.integration_custom_section_description'
            type: section
            span: full
            cssClass: mt-4
            tab: 'janvince.smallgdpr::lang.settings.tabs.cookies'
        custom_head_code:
            label: 'janvince.smallgdpr::lang.settings.form_fields.custom_head_code'
            comment: 'janvince.smallgdpr::lang.settings.form_fields.custom_head_code_description'
            type: codeeditor
            language: html
            size: large
            fontSize: 12px
            span: full
            tab: 'janvince.smallgdpr::lang.settings.tabs.cookies'
        custom_body_code:
            label: 'janvince.smallgdpr::lang.settings.form_fields.custom_body_code'
            comment: 'janvince.smallgdpr::lang.settings.form_fields.custom_body_code_description'
            type: codeeditor
            language: html
            size: large
            fontSize: 12px
            span: full
            tab: 'janvince.smallgdpr::lang.settings.tabs.cookies'


        ## ============================ Cookies bar ============================

        cookies_bar_title:
            span: left
            label: 'janvince.smallgdpr::lang.settings.form_fields.title'
            type: text
            tab: 'janvince.smallgdpr::lang.settings.tabs.cookies_bar'
        cookies_bar_content:
            span: right
            label: 'janvince.smallgdpr::lang.settings.form_fields.content'
            type: richeditor
            size: large
            tab: 'janvince.smallgdpr::lang.settings.tabs.cookies_bar'
        cookies_bar_disable_page_reload:
            label: 'janvince.smallgdpr::lang.settings.form_fields.disable_page_reload'
            comment: 'janvince.smallgdpr::lang.settings.form_fields.disable_page_reload_description'
            type: checkbox
            default: 1
            span: left
            tab: 'janvince.smallgdpr::lang.settings.tabs.cookies_bar'
        buttons_section:
            label: 'janvince.smallgdpr::lang.settings.form_fields.buttons_section'
            comment: 'janvince.smallgdpr::lang.settings.form_fields.buttons_section_description'
            type: section
            span: full
            cssClass: m-t
            tab: 'janvince.smallgdpr::lang.settings.tabs.cookies_bar'
        btn_accept_label:
            label: 'janvince.smallgdpr::lang.settings.form_fields.btn_accept_label'
            type: text
            default: Accept
            span: left
            tab: 'janvince.smallgdpr::lang.settings.tabs.cookies_bar'
        btn_save_label:
            label: 'janvince.smallgdpr::lang.settings.form_fields.btn_save_label'
            comment: 'janvince.smallgdpr::lang.settings.form_fields.btn_save_label_description'
            type: text
            default: 'Save selection'
            span: right
            tab: 'janvince.smallgdpr::lang.settings.tabs.cookies_bar'
        btn_reject_label:
            label: 'janvince.smallgdpr::lang.settings.form_fields.btn_reject_label'
            type: text
            default: Reject
            span: left
            tab: 'janvince.smallgdpr::lang.settings.tabs.cookies_bar'
        btn_reject_show:
            label: 'janvince.smallgdpr::lang.settings.form_fields.btn_reject_show'
            comment: 'janvince.smallgdpr::lang.settings.form_fields.btn_reject_show_description'
            type: checkbox
            default: 1
            span: right
            tab: 'janvince.smallgdpr::lang.settings.tabs.cookies_bar'
        btn_settings_label:
            label: 'janvince.smallgdpr::lang.settings.form_fields.btn_settings_label'
            type: text
            default: Settings
            span: left
            tab: 'janvince.smallgdpr::lang.settings.tabs.cookies_bar'
        btn_settings_show:
            label: 'janvince.smallgdpr::lang.settings.form_fields.btn_settings_show'
            comment: 'janvince.smallgdpr::lang.settings.form_fields.btn_settings_show_description'
            type: checkbox
            default: 1
            span: right
            tab: 'janvince.smallgdpr::lang.settings.tabs.cookies_bar'


        ## ============================ Manage cookies ============================

        cookies_manage_title:
            label: 'janvince.smallgdpr::lang.settings.form_fields.title'
            type: text
            span: left
            tab: 'janvince.smallgdpr::lang.settings.tabs.cookies_manage'
        cookies_manage_content:
            label: 'janvince.smallgdpr::lang.settings.form_fields.content'
            type: richeditor
            span: full
            size: large
            tab: 'janvince.smallgdpr::lang.settings.tabs.cookies_manage'
        cookies_manage_disable_page_reload:
            label: 'janvince.smallgdpr::lang.settings.form_fields.disable_page_reload'
            comment: 'janvince.smallgdpr::lang.settings.form_fields.disable_page_reload_description'
            type: checkbox
            default: 1
            span: left
            tab: 'janvince.smallgdpr::lang.settings.tabs.cookies_manage'


        ## ============================ Settings ============================

        set_cookies_lifetime_days:
            label: 'janvince.smallgdpr::lang.settings.form_fields.cookies_lifetime_days'
            comment: 'janvince.smallgdpr::lang.settings.form_fields.cookies_lifetime_days_comment'
            default: 365
            step: 1
            min: 1
            type: number
            span: left
            tab: 'janvince.smallgdpr::lang.settings.tabs.settings'
        set_cookies_with_locale:
            label: 'janvince.smallgdpr::lang.settings.form_fields.set_cookies_with_locale'
            comment: 'janvince.smallgdpr::lang.settings.form_fields.set_cookies_with_locale_comment'
            default: 0
            type: checkbox
            span: full
            tab: 'janvince.smallgdpr::lang.settings.tabs.settings'

        section_import:
            label: 'janvince.smallgdpr::lang.settings.tabs.import'
            type: section
            span: full
            cssClass: m-t
            tab: 'janvince.smallgdpr::lang.settings.tabs.settings'
        import_preset_media:
            label: 'janvince.smallgdpr::lang.settings.form_fields.import_path_media'
            comment: 'janvince.smallgdpr::lang.settings.form_fields.import_path_media_description'
            type: mediafinder
            span: left
            mode: file
            tab: 'janvince.smallgdpr::lang.settings.tabs.settings'
        import_preset_btn:
            type: importpreset
            span: full
            tab: 'janvince.smallgdpr::lang.settings.tabs.settings'

        section_export:
            label: 'janvince.smallgdpr::lang.settings.tabs.export'
            type: section
            span: full
            cssClass: m-t
            tab: 'janvince.smallgdpr::lang.settings.tabs.settings'
        export_preset_btn:
            type: exportpreset
            span: left
            tab: 'janvince.smallgdpr::lang.settings.tabs.settings'

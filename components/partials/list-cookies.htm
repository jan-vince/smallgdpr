{% partial '@list-cookies-' ~ cookiesSettingsGet('ui_style', 'default') disableSaveButton = disableSaveButton|default(false) customId = customId|default('custom') %}

{% put scripts %}

<script>

    (function() {
        var saveBtn = document.getElementById('cookies-manage-save{{ customId|default('custom') }}');
        if (!saveBtn) { return; }

        saveBtn.addEventListener('click', function(e) {
            e.preventDefault();

            {% partial '@set-cookies' setOnlyManageCookies = true %}

            {% if cookiesSettingsGet('cookies_manage_disable_page_reload', 0) == 0 %}

                location.reload(true);

            {% else %}

                var bar = document.getElementById('cookies-bar');
                if (bar) {
                    bar.style.display = 'none';
                }

                var modalEl = document.getElementById('sg-settings-modal-{{ __SELF__ }}');
                if (modalEl && typeof bootstrap !== 'undefined' && bootstrap.Modal) {
                    var modalInstance = bootstrap.Modal.getInstance(modalEl) || new bootstrap.Modal(modalEl);
                    modalInstance.hide();
                }

            {% endif %}

        });
    })();

</script>

{% endput %}
